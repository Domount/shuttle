name: Bug report
description: Report something that isn't working correctly
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please include steps to reproduce when possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. npx @domount/create-shuttle my-app
        2. npm run dev
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Shuttle version
      placeholder: e.g. @domount/shuttle@0.1.2
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 20.x
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - create-shuttle / template
        - @domount/shuttle (framework)
        - docs / website
        - example app
        - other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant terminal output or add screenshots
