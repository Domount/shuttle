name: Feature request
description: Suggest an idea for Shuttle
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you're trying to solve. Feature requests with clear use cases are easier to evaluate.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've thought about

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI / scaffolding
        - framework (@domount/shuttle)
        - agent / skills
        - web template
        - docs
        - other
    validations:
      required: true
